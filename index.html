<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>AC Milan</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --red:#CC0000;
  --red2:#FF1A1A;
  --red-glow:rgba(204,0,0,0.35);
  --bg:#080808;
  --dark:#0F0F0F;
  --card:#141414;
  --card2:#1C1C1C;
  --border:#242424;
  --border2:rgba(255,255,255,0.06);
  --txt:#F0EBE0;
  --mute:#666;
  --gold:#C8A96E;
  --gold2:rgba(200,169,110,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;user-select:none;}

/* ══════════════════════
   SPLASH
══════════════════════ */
#splash{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 55%,#1a0000 0%,#080808 68%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity .5s ease;
}
#splash.hide{opacity:0;pointer-events:none;}

.sp-emblem{
  position:relative;margin-bottom:24px;
}
.sp-ring{
  width:120px;height:120px;border-radius:50%;
  border:2px solid rgba(204,0,0,0.25);
  display:flex;align-items:center;justify-content:center;
  animation:spRingPulse 2s ease-in-out infinite;
}
@keyframes spRingPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(204,0,0,0);}
  50%{box-shadow:0 0 0 12px rgba(204,0,0,0.08);}
}
.sp-badge{
  width:96px;height:96px;border-radius:50%;
  background:linear-gradient(145deg,#CC0000 0%,#8B0000 50%,#0A0A0A 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 60px rgba(204,0,0,0.5),0 0 120px rgba(204,0,0,0.2);
  animation:spBadgePulse 2s ease-in-out infinite;
}
@keyframes spBadgePulse{
  0%,100%{box-shadow:0 0 40px rgba(204,0,0,0.4),0 0 80px rgba(204,0,0,0.15);}
  50%{box-shadow:0 0 80px rgba(204,0,0,0.7),0 0 160px rgba(204,0,0,0.3);}
}
.sp-m{font-size:44px;font-weight:900;color:#fff;letter-spacing:-2px;line-height:1;}

.sp-name{font-size:28px;font-weight:900;color:#fff;letter-spacing:4px;margin-bottom:4px;}
.sp-sub{font-size:12px;color:var(--mute);letter-spacing:3px;text-transform:uppercase;margin-bottom:48px;}

.sp-bar-wrap{width:180px;}
.sp-track{height:2px;background:rgba(255,255,255,0.07);border-radius:99px;overflow:hidden;margin-bottom:12px;}
.sp-fill{height:100%;width:0;background:linear-gradient(90deg,var(--red),var(--red2));border-radius:99px;animation:spFill .8s cubic-bezier(.4,0,.2,1) forwards;}
@keyframes spFill{from{width:0}to{width:100%}}
.sp-pct{font-size:11px;color:var(--mute);text-align:center;letter-spacing:1px;}

/* ══════════════════════
   APP SHELL
══════════════════════ */
#app{display:none;flex-direction:column;height:100vh;}
#app.on{display:flex;}
.page{display:none;flex:1;flex-direction:column;overflow:hidden;}
.page.on{display:flex;}

/* ══════════════════════
   TOP BAR
══════════════════════ */
.topbar{
  flex-shrink:0;
  background:rgba(8,8,8,0.97);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 16px 10px;
  display:flex;align-items:center;gap:12px;
  position:relative;z-index:10;
}
.tb-badge{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--red) 50%,#000 50%);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;color:#fff;
  box-shadow:0 0 0 2px var(--gold),0 4px 16px rgba(204,0,0,0.3);
}
.tb-info{flex:1;}
.tb-title{font-size:17px;font-weight:900;letter-spacing:2px;color:#fff;line-height:1.1;}
.tb-sub{font-size:10px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-top:1px;}
.tb-season{
  background:var(--card2);border:1px solid var(--border);
  color:var(--gold);font-size:10px;font-weight:700;font-family:'Cairo',sans-serif;
  padding:4px 10px;border-radius:20px;letter-spacing:1px;
}

/* ══════════════════════
   NEWS TICKER
══════════════════════ */
.ticker{
  flex-shrink:0;height:30px;background:var(--red);
  display:flex;align-items:center;overflow:hidden;
}
.ticker-tag{
  background:rgba(0,0,0,0.35);color:#fff;
  font-size:10px;font-weight:700;font-family:'Cairo',sans-serif;
  padding:0 12px;height:100%;display:flex;align-items:center;
  letter-spacing:2px;flex-shrink:0;white-space:nowrap;
}
.ticker-scroll{display:flex;animation:tickScroll 35s linear infinite;white-space:nowrap;align-items:center;height:100%;}
.ticker-item{font-size:12px;font-weight:600;color:#fff;padding:0 28px;font-family:'Cairo',sans-serif;}
@keyframes tickScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ══════════════════════
   NAV TABS
══════════════════════ */
.nav{
  flex-shrink:0;display:flex;overflow-x:auto;scrollbar-width:none;
  background:var(--dark);border-bottom:1px solid var(--border);
  padding:0 4px;
}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{
  flex-shrink:0;background:none;border:none;
  color:var(--mute);font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;
  padding:11px 16px;cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .2s;white-space:nowrap;
  display:flex;align-items:center;gap:5px;
}
.nav-btn.on{color:var(--gold);border-bottom-color:var(--red);}

/* ══════════════════════
   SCROLL AREA
══════════════════════ */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{display:none;}
.pad{padding:14px 14px 80px;}

/* ══════════════════════
   HERO MATCH
══════════════════════ */
.hero{
  background:linear-gradient(145deg,#1a0000 0%,#0d0000 40%,#080808 100%);
  border:1px solid rgba(204,0,0,0.2);
  border-radius:16px;margin-bottom:18px;
  padding:18px 16px;position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,rgba(204,0,0,0.15) 0%,transparent 70%);
}
.hero-lbl{
  font-size:10px;letter-spacing:3px;color:var(--gold);
  text-transform:uppercase;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;font-weight:700;
}
.hero-comp{
  background:rgba(204,0,0,0.2);border:1px solid rgba(204,0,0,0.3);
  color:var(--red2);font-size:10px;font-weight:700;
  padding:2px 10px;border-radius:4px;letter-spacing:1px;
}
.hero-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.hero-team{text-align:center;flex:1;}
.hero-team-ico{
  width:56px;height:56px;border-radius:50%;
  background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);
  margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:24px;
}
.hero-team-name{font-size:13px;font-weight:700;color:var(--txt);}
.hero-team-name.milan{color:var(--gold);}
.hero-vs{text-align:center;flex-shrink:0;}
.hero-score{font-size:36px;font-weight:900;color:#fff;letter-spacing:4px;line-height:1;}
.hero-score.upcoming{font-size:18px;color:var(--mute);letter-spacing:2px;font-weight:700;}
.hero-vs-comp{font-size:10px;color:var(--mute);margin-top:4px;letter-spacing:1px;}
.hero-meta{
  display:flex;justify-content:center;gap:20px;
  margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.05);
}
.hero-meta-item{text-align:center;}
.hero-meta-val{font-size:13px;font-weight:700;color:var(--txt);}
.hero-meta-lbl{font-size:10px;color:var(--mute);margin-top:2px;}

/* LIVE BADGE */
.live-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--red);color:#fff;font-size:10px;font-weight:900;
  padding:3px 10px;border-radius:4px;letter-spacing:2px;
  animation:livePulse 1.5s ease-in-out infinite;
}
.live-dot{width:5px;height:5px;background:#fff;border-radius:50%;}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ══════════════════════
   SECTION TITLE
══════════════════════ */
.sec-title{
  font-size:11px;letter-spacing:3px;text-transform:uppercase;
  color:var(--gold);font-weight:900;
  margin-bottom:12px;padding-bottom:10px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
}
.sec-title::before{content:'';width:3px;height:13px;background:var(--red);border-radius:2px;}

/* ══════════════════════
   MATCH CARD
══════════════════════ */
.match-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:13px 14px;margin-bottom:9px;
  display:flex;align-items:center;gap:12px;
  transition:border-color .2s;
}
.match-card:active{border-color:rgba(204,0,0,0.3);}
.match-date{text-align:center;min-width:44px;flex-shrink:0;}
.match-date .day{font-size:20px;font-weight:900;color:#fff;line-height:1;}
.match-date .mon{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:1px;}
.match-div{width:1px;height:38px;background:var(--border);flex-shrink:0;}
.match-info{flex:1;min-width:0;}
.match-teams{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.match-teams .milan{color:var(--gold);}
.match-comp{font-size:11px;color:var(--mute);}
.match-right{text-align:center;flex-shrink:0;}
.match-score{font-size:20px;font-weight:900;letter-spacing:2px;color:#fff;}
.match-score.upcoming{font-size:13px;color:var(--mute);font-weight:700;letter-spacing:0;}
.match-result{font-size:10px;margin-top:3px;font-weight:700;}
.res-w{color:#34C759;}.res-l{color:var(--red);}.res-d{color:var(--gold);}

/* ══════════════════════
   NEWS CARD
══════════════════════ */
.news-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;margin-bottom:12px;
  transition:border-color .2s;
}
.news-card:active{border-color:rgba(204,0,0,0.3);}
.news-card.featured{border-color:rgba(204,0,0,0.25);}
.news-img{
  width:100%;height:155px;object-fit:cover;display:block;
  background:linear-gradient(145deg,#1a0000,#111);
}
.news-img-ph{
  width:100%;height:155px;
  background:linear-gradient(145deg,#1a0000 0%,#0d0d0d 100%);
  display:flex;align-items:center;justify-content:center;font-size:38px;
}
.news-body{padding:13px 14px;}
.news-cat{
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--red2);font-weight:700;margin-bottom:6px;
}
.news-card.featured .news-cat{color:var(--gold);}
.news-title{font-size:15px;font-weight:900;color:var(--txt);line-height:1.45;margin-bottom:7px;}
.news-preview{font-size:13px;color:var(--mute);line-height:1.6;}
.news-date{font-size:11px;color:rgba(200,169,110,0.5);margin-top:10px;}

/* ══════════════════════
   SUMMARY CARD
══════════════════════ */
.sum-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;margin-bottom:12px;
  transition:border-color .2s;
}
.sum-card:active{border-color:rgba(204,0,0,0.3);}
.sum-thumb{
  width:100%;height:145px;position:relative;
  background:linear-gradient(145deg,#1a0000,#0d0d0d);
  display:flex;align-items:center;justify-content:center;
}
.sum-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.sum-thumb-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 60%);
}
.play-btn{
  position:relative;z-index:2;
  width:54px;height:54px;border-radius:50%;
  background:rgba(204,0,0,0.85);backdrop-filter:blur(6px);
  border:2px solid rgba(255,255,255,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;padding-right:2px;
  box-shadow:0 4px 20px rgba(204,0,0,0.5);
}
.sum-body{padding:12px 14px;}
.sum-title{font-size:14px;font-weight:700;color:var(--txt);}
.sum-match{font-size:11px;color:var(--mute);margin-top:4px;}

/* ══════════════════════
   CHANNEL CARD
══════════════════════ */
.ch-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px 15px;margin-bottom:9px;
  display:flex;align-items:center;gap:13px;
  text-decoration:none;transition:all .2s;
}
.ch-card:active{border-color:rgba(200,169,110,0.3);transform:scale(0.99);}
.ch-ico{
  width:48px;height:48px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,rgba(204,0,0,0.2),rgba(139,0,0,0.1));
  border:1px solid rgba(204,0,0,0.15);
  display:flex;align-items:center;justify-content:center;font-size:24px;
}
.ch-info{flex:1;min-width:0;}
.ch-name{font-size:15px;font-weight:700;color:var(--txt);}
.ch-desc{font-size:12px;color:var(--mute);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-arrow{color:var(--gold);font-size:16px;flex-shrink:0;opacity:0.6;}

/* ══════════════════════
   LOADER / EMPTY
══════════════════════ */
.loader{
  display:flex;align-items:center;justify-content:center;
  gap:10px;padding:44px 20px;color:var(--mute);font-size:13px;
}
.spin{
  width:22px;height:22px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.07);border-top-color:var(--red);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;}
.empty-ico{font-size:42px;margin-bottom:12px;}
.empty-txt{font-size:14px;color:var(--mute);}

/* FADE IN */
.fade-in{animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- ══ SPLASH ══ -->
<div id="splash">
  <div class="sp-emblem">
    <div class="sp-ring">
      <div class="sp-badge"><div class="sp-m">M</div></div>
    </div>
  </div>
  <div class="sp-name">AC MILAN</div>
  <div class="sp-sub">Sempre Milan</div>
  <div class="sp-bar-wrap">
    <div class="sp-track"><div class="sp-fill"></div></div>
    <div class="sp-pct" id="spPct">جارٍ التحميل...</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="tb-badge">M</div>
    <div class="tb-info">
      <div class="tb-title">AC MILAN</div>
      <div class="tb-sub">Sempre Milan</div>
    </div>
    <div class="tb-season" id="seasonLabel">2025/26</div>
  </div>

  <!-- TICKER -->
  <div class="ticker">
    <div class="ticker-tag">🔴 أخبار</div>
    <div class="ticker-scroll" id="tickerScroll">
      <span class="ticker-item">مرحباً بك في تطبيق ميلان</span>
      <span class="ticker-item">🔴⚫ Forza Milan</span>
      <span class="ticker-item">مرحباً بك في تطبيق ميلان</span>
      <span class="ticker-item">🔴⚫ Forza Milan</span>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <button class="nav-btn on" id="nb-home" onclick="goPage('home')">🏠 الرئيسية</button>
    <button class="nav-btn" id="nb-matches" onclick="goPage('matches')">⚽ المباريات</button>
    <button class="nav-btn" id="nb-news" onclick="goPage('news')">📰 الأخبار</button>
    <button class="nav-btn" id="nb-summaries" onclick="goPage('summaries')">🎬 الملخصات</button>
    <button class="nav-btn" id="nb-channels" onclick="goPage('channels')">📡 القنوات</button>
  </div>

  <!-- ── HOME ── -->
  <div class="page on" id="pg-home">
    <div class="scroll"><div class="pad">
      <div id="homeHero"><div class="loader"><div class="spin"></div>تحميل...</div></div>
      <div class="sec-title" style="margin-top:4px">📰 آخر الأخبار</div>
      <div id="homeNews"><div class="loader"><div class="spin"></div>تحميل...</div></div>
    </div></div>
  </div>

  <!-- ── MATCHES ── -->
  <div class="page" id="pg-matches">
    <div class="scroll"><div class="pad">
      <div id="matchesContent"><div class="loader"><div class="spin"></div>تحميل المباريات...</div></div>
    </div></div>
  </div>

  <!-- ── NEWS ── -->
  <div class="page" id="pg-news">
    <div class="scroll"><div class="pad">
      <div class="sec-title">📰 الأخبار</div>
      <div id="newsContent"><div class="loader"><div class="spin"></div>تحميل الأخبار...</div></div>
    </div></div>
  </div>

  <!-- ── SUMMARIES ── -->
  <div class="page" id="pg-summaries">
    <div class="scroll"><div class="pad">
      <div class="sec-title">🎬 الملخصات</div>
      <div id="summariesContent"><div class="loader"><div class="spin"></div>تحميل الملخصات...</div></div>
    </div></div>
  </div>

  <!-- ── CHANNELS ── -->
  <div class="page" id="pg-channels">
    <div class="scroll"><div class="pad">
      <div id="channelsContent"><div class="loader"><div class="spin"></div>تحميل القنوات...</div></div>
    </div></div>
  </div>

</div><!-- /app -->

<script>
// ══ SUPABASE ══
const SURL = 'https://ckriyvqnrzravknajckl.supabase.co';
const SKEY = 'sb_publishable_rFMfYa3nWxyxp6_zYUdtCw_znCYEKfV';
const { createClient } = supabase;
const db = createClient(SURL, SKEY);

// ══ TELEGRAM ══
const tg = window.Telegram?.WebApp;
if(tg){ tg.ready(); tg.expand(); tg.setHeaderColor('#080808'); tg.setBackgroundColor('#080808'); }

// ══ SPLASH ══
let splashDone = false;
function hideSplash(){
  if(splashDone) return; splashDone=true;
  const sp = document.getElementById('splash');
  sp.classList.add('hide');
  setTimeout(()=>{ sp.style.display='none'; },600);
  document.getElementById('app').classList.add('on');
}
document.querySelector('.sp-fill').addEventListener('animationend',()=>{
  document.getElementById('spPct').textContent='جاهز!';
  setTimeout(hideSplash,300);
});
setTimeout(hideSplash, 2500);

// ══ NAV ══
let curPage = 'home';
const loaded = {};

function goPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');
  document.getElementById('nb-'+name).classList.add('on');
  curPage = name;
  if(!loaded[name]){
    loaded[name]=true;
    if(name==='matches') loadMatches();
    if(name==='news') loadNews();
    if(name==='summaries') loadSummaries();
    if(name==='channels') loadChannels();
  }
}

// ══ HELPERS ══
function fmtDate(str){
  const d=new Date(str);
  return { day:d.getDate(), mon:d.toLocaleDateString('ar-SA',{month:'short'}), time:d.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'}), full:d.toLocaleDateString('ar-SA',{weekday:'short',day:'numeric',month:'short'}) };
}
const CAT_LABEL = {general:'عام',match:'مباريات',transfer:'انتقالات',injury:'إصابات',training:'تدريبات'};

// ══ TICKER ══
async function loadTicker(){
  try{
    const {data}=await db.from('news').select('title').order('published_at',{ascending:false}).limit(6);
    if(!data?.length) return;
    const items=[...data,...data].map(n=>`<span class="ticker-item">🔴 ${n.title}</span>`).join('');
    document.getElementById('tickerScroll').innerHTML=items;
  }catch(e){}
}

// ══ HERO MATCH ══
async function loadHero(){
  const el=document.getElementById('homeHero');
  try{
    let {data}=await db.from('matches').select('*').in('status',['upcoming','live']).order('match_date').limit(1);
    if(!data?.length){
      const r=await db.from('matches').select('*').eq('status','finished').order('match_date',{ascending:false}).limit(1);
      data=r.data;
    }
    if(!data?.length){ el.innerHTML=''; return; }
    el.innerHTML=buildHero(data[0]);
  }catch(e){ el.innerHTML=''; }
}

function buildHero(m){
  const d=new Date(m.match_date);
  const dateStr=d.toLocaleDateString('ar-SA',{day:'numeric',month:'short'});
  const timeStr=d.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
  const isHome=m.home_team==='AC Milan';
  const scoreHtml = m.status==='upcoming'
    ? `<div class="hero-score upcoming">VS</div>`
    : `<div class="hero-score">${m.home_score??0} - ${m.away_score??0}</div>`;
  const liveHtml = m.status==='live'
    ? `<div style="text-align:center;margin-bottom:12px"><span class="live-badge"><span class="live-dot"></span>مباشر الآن</span></div>`:'';
  const lblHtml = m.status==='upcoming' ? 'المباراة القادمة 📅' : m.status==='live' ? 'يلعب الآن' : 'آخر مباراة';
  return `
  <div class="hero fade-in">
    ${liveHtml}
    <div class="hero-lbl">
      <span>${lblHtml}</span>
      <span class="hero-comp">${m.competition}</span>
    </div>
    <div class="hero-teams">
      <div class="hero-team">
        <div class="hero-team-ico">🔴</div>
        <div class="hero-team-name ${isHome?'milan':''}">${m.home_team}</div>
      </div>
      <div class="hero-vs">
        ${scoreHtml}
        <div class="hero-vs-comp">${m.venue||'San Siro'}</div>
      </div>
      <div class="hero-team">
        <div class="hero-team-ico">⚫</div>
        <div class="hero-team-name ${!isHome?'milan':''}">${m.away_team}</div>
      </div>
    </div>
    <div class="hero-meta">
      <div class="hero-meta-item"><div class="hero-meta-val">${dateStr}</div><div class="hero-meta-lbl">التاريخ</div></div>
      <div class="hero-meta-item"><div class="hero-meta-val">${timeStr}</div><div class="hero-meta-lbl">الوقت</div></div>
      ${m.match_week?`<div class="hero-meta-item"><div class="hero-meta-val">الجولة ${m.match_week}</div><div class="hero-meta-lbl">الجولة</div></div>`:''}
    </div>
  </div>`;
}

// ══ HOME NEWS ══
async function loadHomeNews(){
  const el=document.getElementById('homeNews');
  try{
    const {data}=await db.from('news').select('*').eq('is_featured',true).order('published_at',{ascending:false}).limit(3);
    if(!data?.length){ el.innerHTML='<div class="empty"><div class="empty-ico">📰</div><div class="empty-txt">لا توجد أخبار</div></div>'; return; }
    el.innerHTML=data.map(buildNewsCard).join('');
  }catch(e){ el.innerHTML=''; }
}

// ══ MATCHES ══
async function loadMatches(){
  const el=document.getElementById('matchesContent');
  try{
    const {data}=await db.from('matches').select('*').order('match_date',{ascending:false});
    if(!data?.length){ el.innerHTML='<div class="empty"><div class="empty-ico">⚽</div><div class="empty-txt">لا توجد مباريات</div></div>'; return; }
    const upcoming=data.filter(m=>m.status!=='finished').sort((a,b)=>new Date(a.match_date)-new Date(b.match_date));
    const finished=data.filter(m=>m.status==='finished');
    let html='';
    if(upcoming.length){ html+=`<div class="sec-title">📅 القادمة</div>`+upcoming.map(buildMatchCard).join(''); }
    if(finished.length){ html+=`<div class="sec-title" style="margin-top:18px">📊 النتائج الأخيرة</div>`+finished.map(buildMatchCard).join(''); }
    el.innerHTML=`<div class="fade-in">${html}</div>`;
  }catch(e){ el.innerHTML='<div class="empty"><div class="empty-ico">❌</div><div class="empty-txt">تعذر التحميل</div></div>'; }
}

function buildMatchCard(m){
  const d=fmtDate(m.match_date);
  const scoreHtml=m.status==='upcoming'
    ?`<div class="match-score upcoming">${d.time}</div>`
    :`<div class="match-score">${m.home_score??0}-${m.away_score??0}</div>`;
  let resHtml='';
  if(m.status==='live') resHtml=`<div class="match-result"><span class="live-badge" style="font-size:9px;padding:1px 7px"><span class="live-dot"></span>LIVE</span></div>`;
  else if(m.status==='finished'){
    const h=m.home_team==='AC Milan', hs=m.home_score??0, as=m.away_score??0;
    const win=(h&&hs>as)||(!h&&as>hs), draw=hs===as;
    resHtml=`<div class="match-result ${win?'res-w':draw?'res-d':'res-l'}">${win?'فوز':draw?'تعادل':'خسارة'}</div>`;
  }
  return `
  <div class="match-card">
    <div class="match-date"><div class="day">${d.day}</div><div class="mon">${d.mon}</div></div>
    <div class="match-div"></div>
    <div class="match-info">
      <div class="match-teams">${m.home_team==='AC Milan'?`<span class="milan">${m.home_team}</span>`:m.home_team} <span style="color:var(--mute);font-size:12px">ضد</span> ${m.away_team==='AC Milan'?`<span class="milan">${m.away_team}</span>`:m.away_team}</div>
      <div class="match-comp">${m.competition}${m.match_week?' · الجولة '+m.match_week:''}</div>
    </div>
    <div class="match-right">${scoreHtml}${resHtml}</div>
  </div>`;
}

// ══ NEWS ══
async function loadNews(){
  const el=document.getElementById('newsContent');
  try{
    const {data}=await db.from('news').select('*').order('published_at',{ascending:false});
    if(!data?.length){ el.innerHTML='<div class="empty"><div class="empty-ico">📰</div><div class="empty-txt">لا توجد أخبار</div></div>'; return; }
    el.innerHTML=`<div class="fade-in">${data.map(buildNewsCard).join('')}</div>`;
  }catch(e){ el.innerHTML='<div class="empty"><div class="empty-ico">❌</div><div class="empty-txt">تعذر التحميل</div></div>'; }
}

function buildNewsCard(n){
  const d=new Date(n.published_at).toLocaleDateString('ar-SA',{day:'numeric',month:'short'});
  const imgHtml=n.image_url
    ?`<img class="news-img" src="${n.image_url}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=news-img-ph>🔴⚫</div>'">`
    :`<div class="news-img-ph">🔴⚫</div>`;
  return `
  <div class="news-card${n.is_featured?' featured':''}">
    ${imgHtml}
    <div class="news-body">
      <div class="news-cat">${CAT_LABEL[n.category]||n.category}</div>
      <div class="news-title">${n.title}</div>
      <div class="news-preview">${n.content.substring(0,110)}${n.content.length>110?'...':''}</div>
      <div class="news-date">🕐 ${d}</div>
    </div>
  </div>`;
}

// ══ SUMMARIES ══
async function loadSummaries(){
  const el=document.getElementById('summariesContent');
  try{
    const {data}=await db.from('summaries').select('*,matches(home_team,away_team,home_score,away_score)').order('created_at',{ascending:false});
    if(!data?.length){ el.innerHTML='<div class="empty"><div class="empty-ico">🎬</div><div class="empty-txt">لا توجد ملخصات</div></div>'; return; }
    el.innerHTML=`<div class="fade-in">${data.map(s=>{
      const m=s.matches;
      const matchStr=m?`${m.home_team} ${m.home_score??''}-${m.away_score??''} ${m.away_team}`:'';
      const onclick=s.video_url?`onclick="window.open('${s.video_url}','_blank')"`:'' ;
      return `
      <div class="sum-card" ${onclick}>
        <div class="sum-thumb">
          ${s.thumbnail_url?`<img src="${s.thumbnail_url}" loading="lazy" onerror="this.remove()">`:''}
          <div class="sum-thumb-overlay"></div>
          <div class="play-btn">▶</div>
        </div>
        <div class="sum-body">
          <div class="sum-title">${s.title}</div>
          ${matchStr?`<div class="sum-match">⚽ ${matchStr}</div>`:''}
        </div>
      </div>`;
    }).join('')}</div>`;
  }catch(e){ el.innerHTML='<div class="empty"><div class="empty-ico">❌</div><div class="empty-txt">تعذر التحميل</div></div>'; }
}

// ══ CHANNELS ══
async function loadChannels(){
  const el=document.getElementById('channelsContent');
  try{
    const {data}=await db.from('channels').select('*').eq('is_active',true).order('sort_order');
    if(!data?.length){ el.innerHTML='<div class="empty"><div class="empty-ico">📡</div><div class="empty-txt">لا توجد قنوات</div></div>'; return; }
    const cats={channel:'📢 القنوات',group:'👥 المجموعات',social:'🌐 تواصل اجتماعي',website:'🔗 المواقع'};
    const grouped={};
    data.forEach(c=>{ if(!grouped[c.category]) grouped[c.category]=[]; grouped[c.category].push(c); });
    let html='';
    for(const [cat,items] of Object.entries(grouped)){
      html+=`<div class="sec-title">${cats[cat]||cat}</div>`;
      html+=items.map(c=>`
        <a class="ch-card" href="${c.url}" target="_blank">
          <div class="ch-ico">${c.icon||'📢'}</div>
          <div class="ch-info">
            <div class="ch-name">${c.name}</div>
            ${c.description?`<div class="ch-desc">${c.description}</div>`:''}
          </div>
          <div class="ch-arrow">←</div>
        </a>`).join('');
      html+='<div style="height:8px"></div>';
    }
    el.innerHTML=`<div class="fade-in">${html}</div>`;
  }catch(e){ el.innerHTML='<div class="empty"><div class="empty-ico">❌</div><div class="empty-txt">تعذر التحميل</div></div>'; }
}

// ══ REALTIME ══
db.channel('milan-live')
  .on('postgres_changes',{event:'*',schema:'public'},()=>{
    loadHero(); loadHomeNews(); loadTicker();
    if(curPage==='matches') loadMatches();
    if(curPage==='news') loadNews();
    if(curPage==='summaries') loadSummaries();
    if(curPage==='channels') loadChannels();
  }).subscribe();

// ══ INIT ══
(async()=>{
  await Promise.all([loadHero(), loadHomeNews(), loadTicker()]);
})();
</script>
