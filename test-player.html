<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>تشخيص التشغيل</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<style>
  body{background:#000;color:#fff;font-family:sans-serif;padding:16px;margin:0;}
  h3{color:#7CF;}
  video{width:100%;background:#111;margin:10px 0;}
  .log{background:#111;border:1px solid #333;border-radius:8px;padding:10px;margin:8px 0;
    white-space:pre-wrap;word-break:break-all;font-size:13px;line-height:1.6;}
  .ok{color:#4f4;font-weight:bold;}
  .err{color:#f66;font-weight:bold;}
  .step{color:#aaa;}
</style>
</head>
<body>
<h3>١) تجربة مباشرة (بدون بروكسي)</h3>
<video id="v1" muted playsinline controls></video>
<div class="log" id="log1">جارِ التحميل…</div>

<h3>٢) تجربة عبر بروكسينا (Supabase)</h3>
<video id="v2" muted playsinline controls></video>
<div class="log" id="log2">جارِ التحميل…</div>

<script>
const SUPABASE_URL = 'https://ckriyvqnrzravknajckl.supabase.co';
const STREAM_PROXY = `${SUPABASE_URL}/functions/v1/stream-proxy`;
const TEST_URL = 'https://raw.githubusercontent.com/ahmedtitr8-hash/milan-mini-app/refs/heads/main/index.live';

function log(id, msg, cls){
  const el = document.getElementById(id);
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
}
function clearLog(id){ document.getElementById(id).innerHTML=''; }

function testDirect(){
  clearLog('log1');
  log('log1', 'الرابط: ' + TEST_URL, 'step');
  if (!(window.Hls && Hls.isSupported())){ log('log1','Hls.js غير مدعوم بهذا المتصفح','err'); return; }
  const v = document.getElementById('v1');
  const hls = new Hls();
  hls.loadSource(TEST_URL);
  hls.attachMedia(v);
  hls.on(Hls.Events.MANIFEST_PARSED, ()=>{ log('log1','✅ نجح تحليل المانيفست، جارِ التشغيل…','ok'); v.play().catch(e=>log('log1','خطأ تشغيل: '+e,'err')); });
  hls.on(Hls.Events.ERROR, (evt,data)=>{
    log('log1', '❌ حدث: '+data.details+' | fatal: '+data.fatal+' | type: '+data.type, 'err');
    if (data.response) log('log1', 'كود الاستجابة: '+data.response.code+' | '+ (data.response.text||''), 'err');
    if (data.error) log('log1', 'تفاصيل: '+ data.error, 'err');
  });
}

function testProxied(){
  clearLog('log2');
  const netUrl = `${STREAM_PROXY}?url=${encodeURIComponent(TEST_URL)}`;
  log('log2', 'الرابط عبر البروكسي: ' + netUrl, 'step');
  if (!(window.Hls && Hls.isSupported())){ log('log2','Hls.js غير مدعوم بهذا المتصفح','err'); return; }
  const v = document.getElementById('v2');
  const Base = Hls.DefaultConfig.loader;
  class ProxyLoader extends Base{
    load(context, config, callbacks){
      if (context && context.url){
        const orig = context.url;
        if (!context.url.startsWith(STREAM_PROXY)){
          context.url = `${STREAM_PROXY}?url=${encodeURIComponent(context.url)}`;
        }
        log('log2', 'طلب: '+orig+'  →  '+context.url, 'step');
      }
      super.load(context, config, callbacks);
    }
  }
  const hls = new Hls({ loader: ProxyLoader });
  hls.loadSource(netUrl);
  hls.attachMedia(v);
  hls.on(Hls.Events.MANIFEST_PARSED, ()=>{ log('log2','✅ نجح تحليل المانيفست، جارِ التشغيل…','ok'); v.play().catch(e=>log('log2','خطأ تشغيل: '+e,'err')); });
  hls.on(Hls.Events.ERROR, (evt,data)=>{
    log('log2', '❌ حدث: '+data.details+' | fatal: '+data.fatal+' | type: '+data.type, 'err');
    if (data.response) log('log2', 'كود الاستجابة: '+data.response.code+' | '+ (data.response.text||''), 'err');
    if (data.error) log('log2', 'تفاصيل: '+ data.error, 'err');
  });
}

testDirect();
testProxied();
</script>
</body>
</html>
